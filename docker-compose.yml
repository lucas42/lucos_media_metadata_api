services:
  api:
    build:
      dockerfile: api/Dockerfile
      context: . # Use root context, so rdfgen can be pulled in
    container_name: lucos_media_metadata_api
    ports: 
      - $PORT:$PORT
    image: lucas42/lucos_media_metadata_api:${VERSION:-latest}
    volumes:
      - "db:/var/lib/media-metadata/"
      - "exports:/var/lib/exports/"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - CLIENT_KEYS
      - LOGANNE_ENDPOINT
      - RDF_OUTPUT_PATH=/var/lib/exports/all-media.ttl
      - MEDIA_METADATA_MANAGER_ORIGIN
      - EOLAS_ORIGIN
      - PORT
      - APP_ORIGIN
      - KEY_LUCOS_EOLAS
      - SCHEDULE_TRACKER_ENDPOINT
      - DEBUG
      - SYSTEM
  exporter:
    build:
      dockerfile: exporter/Dockerfile
      context: . # Use root context, so rdfgen can be pulled in
    container_name: lucos_media_metadata_api_exporter
    image: lucas42/lucos_media_metadata_api_exporter:${VERSION:-latest}
    volumes:
      - db:/data
      - exports:/exports
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "find \"$$RDF_OUTPUT_PATH\" -mmin -120 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 2m
    environment:
      - SQLITE_DB_PATH=/data/media.sqlite
      - RDF_OUTPUT_PATH=/exports/all-media.ttl
      - SCHEDULE_TRACKER_ENDPOINT
      - MEDIA_METADATA_MANAGER_ORIGIN
      - APP_ORIGIN

volumes:
  db:
  exports: